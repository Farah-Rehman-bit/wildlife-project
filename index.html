<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    background-image: url("back.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
}

.box{
    background: linear-gradient(to bottom,#D9D2CC  , #A97155, #723E31);
    width:700px;
    height:850px;
    border: 4px block  white;
    margin-left: 500px;
    border-radius: 30px;
    margin-top: 30px;
}
.box:hover{
    box-shadow:  9px 9px 9px white;
    
}

img{
    height: 160px;
    width: 160px;
    border-radius: 50%;
    margin-top: 10px;
}
.upleft{
  
    border:4PX block #774c60;
    background-color:#774c60;
    height: 180px;
    width: 180px;
  text-align: center;
    border-radius: 50%;
      margin: 30px;
margin-right: 250px;
}
.oneline{
    display: flex;
}
.twoline{
    display: flex;
    margin-top: 70px;
}
.upright{
  
    border:4PX block #eacdc2;
    background-color: #eacdc2;
    height: 180px;
    width: 180px;
  text-align: center;
    border-radius: 50%;
      margin: 30px;

}
.mid{
      border:4PX block #1a1423;
    background-color: #1a1423;
    height: 180px;
    width: 180px;
  text-align: center;
    border-radius: 50%;
      margin: 30px;
      margin-top: 120px;

}
.downleft{
  
    border:4PX block #b75d69;
    background-color:#b75d69;
    height: 180px;
    width: 180px;
  text-align: center;
    border-radius: 50%;
      margin: 30px;
margin-right: 250px;
}
.downright{
  
    border:4PX block #774c60;
    background-color: #774c60;
    height: 180px;
    width: 180px;
  text-align: center;
    border-radius: 50%;
      margin: 30px;
      

}
.container{
    display: flex;
    align-items: center;      /* Vertically centers the content */
    justify-content: center;
    gap: 70px;                /* Space between text and gallery */
    min-height: 100vh;
}

.content{
    width: 350px;
}

.text-box{
    padding: 30px;
    border-radius: 20px;
    background: linear-gradient(135deg,#6B3F2B,#A97155);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,.3);
}

.text-box h1{
    font-size: 42px;
    margin-bottom: 15px;
}

.text-box p{
    line-height: 1.8;
    margin-bottom: 20px;
}

.text-box button{
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #6B3F2B;
    font-weight: bold;
    cursor: pointer;
}

.text-box button:hover{
    background: #f2f2f2;
}
.content:hover{
 box-shadow:  9px 9px 9px white;
}

    </style>

</head>
<body>
    <div class="container">
    
        <div class="content">
            <div class="text-box">
                <h1>WildLife Gallery</h1>
    
                <p>
                    Step into the world of wildlife and discover the beauty of nature.
                    Meet the majestic tiger, graceful deer, powerful horse,
                    adorable rabbit, and playful cat through this gallery.
                </p>
    
                <button>Explore Gallery</button>
            </div>
        </div>
   
  
    <div class="box">
    <div class="oneline">
<div class="upleft">
<img src="tiger.jpeg" alt=""></div>
<div class="upright">
<img src="deer.jpeg" alt=""></div>
</div>
<center>
    <div class="mid">
<img src="horse.jpeg" alt="">
</div>
</center>
 <div class="twoline">
<div class="downleft">
<img src="rabbit.jpeg" alt="">
</div>
<div class="downright">
<img src="cat.jpeg" alt="">
</div>
</div>
</div>
</div>
</div>
</body>
</html>
